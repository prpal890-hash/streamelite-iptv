<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact StreamElite Support | 24/7 IPTV Help</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background-color:#0B0B0B;color:#FFF;} .glassmorphism{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(10px);}</style>
</head>
<body class="antialiased pt-28 pb-20">
  <main class="max-w-xl mx-auto px-4">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold mb-4">Contact Our Engineers</h1>
      <p class="text-neutral-400 text-sm">Need a custom plan or technical setup help? Send us a message.</p>
    </div>

    <div class="glassmorphism rounded-3xl p-8 border-t border-primaryPurple/40 shadow-2xl relative overflow-hidden">
      <div class="absolute top-0 right-0 w-32 h-32 bg-primaryPurple/10 rounded-full blur-2xl"></div>
      <form class="space-y-6 relative z-10" action="https://formspree.io/f/your-id-here" method="POST">
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">Name</label>
          <input type="text" name="name" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-primaryPurple">
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">Email</label>
          <input type="email" name="email" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-primaryPurple">
        </div>
        <div>
          <label class="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">Message</label>
          <textarea rows="4" name="msg" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-primaryPurple"></textarea>
        </div>
        <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-fuchsia-600 rounded-xl text-xs font-bold uppercase tracking-wider text-white hover:scale-[1.02] transition-transform shadow-lg shadow-purple-600/30">Send Message</button>
      </form>
    </div>
  </main>
</body>
</html>
